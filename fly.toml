# fly.toml app configuration file generated for roomify-backend on 2026-05-06T09:59:24Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'roomify-backend'
primary_region = 'lax'

[build]

[http_service]
  internal_port = 9090
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
