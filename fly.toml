app = 'roomify-backend'
primary_region = 'fra'

[build]

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 0
processes = ['app']

[[vm]]
memory = '1gb'
cpus = 1
memory_mb = 1024

[checks]

[checks.alive]
grace_period = "180s"
interval = "30s"
timeout = "10s"
type = "http"
method = "get"
path = "/"